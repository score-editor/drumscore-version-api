services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: drumscore-api-dev
    ports:
      - "8081:8080"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./release-notes:/app/release-notes:ro
    environment:
      - CONFIG_PATH=/app/config/version-multiplatform.json
      - DB_PATH=/app/data/analytics.db
      - ANALYTICS_SECRET=dev-secret
      - ADMIN_SECRET=${ADMIN_SECRET:-dev-secret}
      - PUBLIC_HOST=http://localhost:8081
